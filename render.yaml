# Render 部署配置

services:
  - type: web
    name: gebudiu-api
    runtime: python
    plan: starter
    
    # 關鍵: 使用 --no-cache-dir 避免緩存問題
    buildCommand: |
      pip install --upgrade pip setuptools wheel --no-cache-dir
      pip install -r requirements-render.txt --no-cache-dir
    
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 --graceful-timeout 600 --keep-alive 60 --workers 1 --threads 1 --max-requests 100 wsgi:app
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "600"
      - key: TM_DB_PATH
        value: /data/translation_memory.db
      - key: TERMINOLOGY_DB_PATH
        value: /data/terminology.db
      - key: ENHANCED_MODE
        value: "true"
    
    disk:
      name: data-disk
      mountPath: /data
      sizeGB: 1
    
    healthCheckPath: /health
    autoDeploy: true
