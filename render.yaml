# GeBuDiu API - Enhanced v3.0
# GBD USP: 格式自學習引擎 - "每一翻譯，都讓下一個更完美"

services:
  - type: web
    name: gebudiu-api
    runtime: python
    plan: starter
    
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 --workers 1 --threads 1 wsgi:app
    
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      # 數據持久化路徑
      - key: TM_DB_PATH
        value: /data/translation_memory.db
      - key: TERMINOLOGY_DB_PATH
        value: /data/terminology.db
      - key: FORMAT_LEARNING_DB_PATH
        value: /data/format_learning.db
      # 功能開關
      - key: ENHANCED_MODE
        value: "true"
      - key: FORMAT_LEARNING_ENABLED
        value: "true"
    
    disk:
      name: data-disk
      mountPath: /data
      sizeGB: 1
    
    healthCheckPath: /health
    autoDeploy: true
