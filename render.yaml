# Render deployment config - SQLite-only mode for production
services:
  - type: web
    name: gebudiu-api
    runtime: python
    plan: starter
    
    buildCommand: |
      pip install --upgrade pip==24.0 setuptools==69.5.1 wheel==0.43.0 &&
      pip install -r requirements-render.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 --workers 1 --threads 1 wsgi:app
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: TM_DB_PATH
        value: /data/translation_memory.db
      - key: TERMINOLOGY_DB_PATH
        value: /data/terminology.db
      - key: ENHANCED_MODE
        value: "true"
      - key: BUILD_CACHE_BUST
        value: "v3-numpy-fix"
    
    disk:
      name: data-disk
      mountPath: /data
      sizeGB: 1
    
    healthCheckPath: /health
    autoDeploy: true
