# Render 部署配置 - 方案A + 方案E
# 修復: Python 3.14 構建隔離問題

services:
  - type: web
    name: gebudiu-api
    runtime: python
    plan: starter  # $7/month, 512MB RAM
    
    # 關鍵修復: 先安裝構建工具，再安裝其他依賴
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install qdrant-client==1.13.3 --no-build-isolation
      pip install sentence-transformers==2.3.1 --no-build-isolation
      pip install -r requirements.txt
    
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 --graceful-timeout 600 --keep-alive 60 --workers 1 --threads 1 --max-requests 100 wsgi:app
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "600"
      - key: TM_DB_PATH
        value: /data/translation_memory.db
      - key: TERMINOLOGY_DB_PATH
        value: /data/terminology.db
      - key: ENHANCED_MODE
        value: "true"
      - key: DEPLOYMENT_MODE
        value: "sqlite_qdrant"
      
      # 方案E: Qdrant配置
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
    
    disk:
      name: data-disk
      mountPath: /data
      sizeGB: 1
    
    healthCheckPath: /health
    autoDeploy: true
