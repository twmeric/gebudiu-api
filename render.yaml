# Render 部署配置 - Starter 計劃 + Translation Memory
# 關鍵: 使用 Python 3.11 確保兼容性

services:
  - type: web
    name: gebudiu-api
    runtime: python
    plan: starter  # $7/month, 512MB RAM
    
    # 明確指定 Python 3.11 (不是 3.14)
    buildCommand: |
      pip install -r requirements.txt
    
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 --graceful-timeout 600 --keep-alive 60 --workers 1 --threads 1 --max-requests 100 wsgi:app
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0  # 必須使用 3.11，3.14 不兼容 faiss
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "600"
      - key: TM_DB_PATH
        value: /data/translation_memory.db
      - key: TRANSFORMERS_CACHE
        value: /tmp/.cache
      - key: ENHANCED_MODE
        value: "true"
    
    # 持久化存儲
    disk:
      name: translation-memory
      mountPath: /data
      sizeGB: 1
    
    healthCheckPath: /health
    autoDeploy: true
