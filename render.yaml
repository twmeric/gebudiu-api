services:
  - type: web
    name: gebudiu-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 300 wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEEPSEEK_API_KEY
        sync: false
