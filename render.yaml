# Render 部署配置 - 簡化版 (移除 Python 3.14 不兼容的依賴)
# 注意: Qdrant 功能在本地使用，Render 上只使用 SQLite

services:
  - type: web
    name: gebudiu-api
    runtime: python
    plan: starter  # $7/month, 512MB RAM
    
    # 簡化構建 - 只安裝穩定的依賴
    buildCommand: pip install -r requirements-render.txt
    
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 --graceful-timeout 600 --keep-alive 60 --workers 1 --threads 1 --max-requests 100 wsgi:app
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "600"
      - key: TM_DB_PATH
        value: /data/translation_memory.db
      - key: TERMINOLOGY_DB_PATH
        value: /data/terminology.db
      - key: ENHANCED_MODE
        value: "true"
      - key: DEPLOYMENT_MODE
        value: "sqlite_only"
    
    disk:
      name: data-disk
      mountPath: /data
      sizeGB: 1
    
    healthCheckPath: /health
    autoDeploy: true
