# Render 部署配置 - Starter 計劃 + Translation Memory
services:
  - type: web
    name: gebudiu-api
    runtime: python
    plan: starter  # $7/month, 512MB RAM
    buildCommand: |
      pip install -r requirements.txt
      python -c "
      try:
          from sentence_transformers import SentenceTransformer
          print('Downloading embedding model...')
          SentenceTransformer('paraphrase-multilingual-MiniLM-L12-v2')
          print('Model downloaded successfully')
      except Exception as e:
          print(f'Model download skipped: {e}')
      "
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 --graceful-timeout 600 --keep-alive 60 --workers 1 --threads 1 --max-requests 100 wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "600"
      - key: TM_DB_PATH
        value: /data/translation_memory.db
      - key: TRANSFORMERS_CACHE
        value: /tmp/.cache
      - key: ENHANCED_MODE
        value: "true"
    disk:
      name: translation-memory
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health
    autoDeploy: true
