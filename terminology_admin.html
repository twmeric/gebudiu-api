<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格不丢術語表管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1em;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #888;
            margin-top: 8px;
        }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .panel-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9em;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: monospace;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .terms-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        
        .terms-table th,
        .terms-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .terms-table th {
            color: #888;
            font-weight: 500;
            font-size: 0.85em;
            text-transform: uppercase;
        }
        
        .terms-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
        }
        
        .badge-system {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }
        
        .badge-user {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }
        
        .priority-bar {
            width: 60px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .priority-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
        }
        
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }
        
        .alert-error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .search-box input {
            flex: 1;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .terms-table {
                font-size: 0.9em;
            }
            
            .terms-table th,
            .terms-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 術語表管理</h1>
            <p class="subtitle">格不丢翻譯 API - 術語表管理系統</p>
        </header>
        
        <!-- 統計卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalTerms">-</div>
                <div class="stat-label">總術語數</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="systemTerms">-</div>
                <div class="stat-label">系統預設</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="userTerms">-</div>
                <div class="stat-label">用戶自定義</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="domainCount">-</div>
                <div class="stat-label">領域數</div>
            </div>
        </div>
        
        <!-- 消息提示 -->
        <div id="alertBox" class="alert hidden"></div>
        
        <!-- 添加術語 -->
        <div class="panel">
            <h2 class="panel-title">➕ 添加術語</h2>
            <div class="form-group">
                <label>原文 (Source)</label>
                <input type="text" id="sourceInput" placeholder="輸入中文術語，如：藍牙耳機">
            </div>
            <div class="form-group">
                <label>譯文 (Target)</label>
                <input type="text" id="targetInput" placeholder="輸入英文譯文，如：Bluetooth Earphones">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>領域 (Domain)</label>
                    <select id="domainInput">
                        <option value="general">通用 (General)</option>
                        <option value="electronics">電子產品 (Electronics)</option>
                        <option value="medical">醫療器械 (Medical)</option>
                        <option value="legal">法律合同 (Legal)</option>
                        <option value="marketing">市場營銷 (Marketing)</option>
                        <option value="industrial">工業技術 (Industrial)</option>
                        <option value="software">軟件/IT (Software)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>優先級 (Priority)</label>
                    <input type="number" id="priorityInput" min="1" max="10" value="5">
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="addTerm()">
                    <span>💾</span> 保存術語
                </button>
            </div>
        </div>
        
        <!-- CSV 導入導出 -->
        <div class="panel">
            <h2 class="panel-title">📁 CSV 批量管理</h2>
            <div class="form-group">
                <label>批量導入 (CSV格式: source,target,category,priority)</label>
                <textarea id="csvInput" placeholder="藍牙耳機,Bluetooth Earphones,electronics,9
充電器,Charger,electronics,8
..."></textarea>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="importCSV()">
                    <span>📥</span> 導入 CSV
                </button>
                <button class="btn btn-secondary" onclick="exportCSV()">
                    <span>📤</span> 導出 CSV
                </button>
            </div>
        </div>
        
        <!-- 術語列表 -->
        <div class="panel">
            <h2 class="panel-title">📋 術語列表</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索術語..." onkeyup="searchTerms()">
                <select id="filterDomain" onchange="loadTerms()">
                    <option value="">所有領域</option>
                    <option value="general">通用</option>
                    <option value="electronics">電子產品</option>
                    <option value="medical">醫療器械</option>
                    <option value="legal">法律合同</option>
                    <option value="marketing">市場營銷</option>
                    <option value="industrial">工業技術</option>
                    <option value="software">軟件/IT</option>
                </select>
                <button class="btn btn-secondary" onclick="loadTerms()">
                    <span>🔄</span> 刷新
                </button>
            </div>
            <div id="termsTableContainer">
                <table class="terms-table">
                    <thead>
                        <tr>
                            <th>原文</th>
                            <th>譯文</th>
                            <th>領域</th>
                            <th>類型</th>
                            <th>優先級</th>
                            <th>使用次數</th>
                        </tr>
                    </thead>
                    <tbody id="termsTableBody">
                        <tr>
                            <td colspan="6" class="empty-state">
                                <div class="empty-state-icon">📭</div>
                                <div>加載中...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // API 基礎 URL
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : 'https://gebudiu-api.onrender.com';
        
        // 領域名稱映射
        const domainNames = {
            'general': '通用',
            'electronics': '電子產品',
            'medical': '醫療器械',
            'legal': '法律合同',
            'marketing': '市場營銷',
            'industrial': '工業技術',
            'software': '軟件/IT'
        };
        
        // 顯示消息
        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.classList.remove('hidden');
            setTimeout(() => alertBox.classList.add('hidden'), 5000);
        }
        
        // 加載統計
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/terminology/stats`);
                const data = await response.json();
                
                document.getElementById('totalTerms').textContent = data.total_terms || 0;
                document.getElementById('systemTerms').textContent = data.system_terms || 0;
                document.getElementById('userTerms').textContent = data.user_terms || 0;
                document.getElementById('domainCount').textContent = 
                    Object.keys(data.domain_distribution || {}).length;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }
        
        // 加載術語列表
        async function loadTerms() {
            try {
                const domain = document.getElementById('filterDomain').value;
                const url = domain 
                    ? `${API_BASE}/terminology/terms?domain=${domain}&limit=100`
                    : `${API_BASE}/terminology/terms?limit=100`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                renderTerms(data.terms || []);
            } catch (error) {
                console.error('Failed to load terms:', error);
                showAlert('加載術語列表失敗', 'error');
            }
        }
        
        // 渲染術語列表
        function renderTerms(terms) {
            const tbody = document.getElementById('termsTableBody');
            
            if (terms.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div>暫無術語</div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = terms.map(term => `
                <tr>
                    <td>${escapeHtml(term.source)}</td>
                    <td>${escapeHtml(term.target)}</td>
                    <td>${domainNames[term.domain] || term.domain}</td>
                    <td>
                        <span class="badge ${term.is_system ? 'badge-system' : 'badge-user'}">
                            ${term.is_system ? '系統' : '用戶'}
                        </span>
                    </td>
                    <td>
                        <div class="priority-bar">
                            <div class="priority-fill" style="width: ${term.priority * 10}%"></div>
                        </div>
                        <small style="color: #888;">${term.priority}/10</small>
                    </td>
                    <td>${term.usage_count || 0}</td>
                </tr>
            `).join('');
        }
        
        // 添加術語
        async function addTerm() {
            const source = document.getElementById('sourceInput').value.trim();
            const target = document.getElementById('targetInput').value.trim();
            const domain = document.getElementById('domainInput').value;
            const priority = parseInt(document.getElementById('priorityInput').value);
            
            if (!source || !target) {
                showAlert('請填寫原文和譯文', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/terminology/terms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source, target, domain, priority })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert('術語添加成功！');
                    document.getElementById('sourceInput').value = '';
                    document.getElementById('targetInput').value = '';
                    loadStats();
                    loadTerms();
                } else {
                    showAlert(data.error || '添加失敗', 'error');
                }
            } catch (error) {
                console.error('Failed to add term:', error);
                showAlert('添加術語失敗', 'error');
            }
        }
        
        // 搜索術語
        async function searchTerms() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                loadTerms();
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/terminology/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                renderTerms(data.terms || []);
            } catch (error) {
                console.error('Failed to search terms:', error);
            }
        }
        
        // 導入 CSV
        async function importCSV() {
            const csvContent = document.getElementById('csvInput').value.trim();
            if (!csvContent) {
                showAlert('請輸入 CSV 內容', 'error');
                return;
            }
            
            const domain = document.getElementById('domainInput').value;
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const formData = new FormData();
            formData.append('file', blob, 'terms.csv');
            formData.append('domain', domain);
            
            try {
                const response = await fetch(`${API_BASE}/terminology/import`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showAlert(`導入成功！成功: ${data.imported}, 失敗: ${data.failed}`);
                    document.getElementById('csvInput').value = '';
                    loadStats();
                    loadTerms();
                } else {
                    showAlert(data.error || '導入失敗', 'error');
                }
            } catch (error) {
                console.error('Failed to import CSV:', error);
                showAlert('導入 CSV 失敗', 'error');
            }
        }
        
        // 導出 CSV
        async function exportCSV() {
            const domain = document.getElementById('filterDomain').value;
            const url = domain 
                ? `${API_BASE}/terminology/export?domain=${domain}`
                : `${API_BASE}/terminology/export`;
            
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `terminology_${domain || 'all'}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(downloadUrl);
                
                showAlert('CSV 導出成功！');
            } catch (error) {
                console.error('Failed to export CSV:', error);
                showAlert('導出 CSV 失敗', 'error');
            }
        }
        
        // HTML 轉義
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadTerms();
        });
    </script>
</body>
</html>
