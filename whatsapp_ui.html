<!--
  GeBuDiu WhatsApp 整合 UI 組件
  可整合到現有 index.html 的翻譯完成頁面
  
  使用方法:
  1. 將此文件內容添加到 index.html 的 </body> 之前
  2. 添加對應的 JavaScript
  3. 在翻譯完成後調用 showWhatsAppShare()
-->

<!-- WhatsApp 分享模態框 -->
<div id="whatsapp-share-modal" class="whatsapp-modal">
    <div class="whatsapp-modal-content">
        <div class="whatsapp-modal-header">
            <h3>📱 分享到 WhatsApp</h3>
            <button class="whatsapp-close-btn" onclick="closeWhatsAppModal()">&times;</button>
        </div>
        
        <div class="whatsapp-modal-body">
            <!-- 步驟 1: 驗證手機號 -->
            <div id="whatsapp-step-verify" class="whatsapp-step">
                <div class="whatsapp-intro">
                    <div class="whatsapp-icon-large">📲</div>
                    <p>通過 WhatsApp 分享翻譯文件給客戶</p>
                </div>
                
                <div class="whatsapp-form-group">
                    <label for="whatsapp-phone">您的 WhatsApp 手機號碼</label>
                    <input type="tel" 
                           id="whatsapp-phone" 
                           class="whatsapp-input" 
                           placeholder="+852 9123 4567 或 85291234567"
                           autocomplete="tel">
                    <span class="whatsapp-hint">支持國際格式，如 +86、+852、+1 等</span>
                </div>
                
                <button class="whatsapp-btn whatsapp-btn-primary" onclick="sendVerificationCode()">
                    <span class="whatsapp-btn-text">發送驗證碼</span>
                    <span class="whatsapp-btn-loading hidden">發送中...</span>
                </button>
            </div>
            
            <!-- 步驟 2: 輸入驗證碼 -->
            <div id="whatsapp-step-code" class="whatsapp-step hidden">
                <div class="whatsapp-intro">
                    <div class="whatsapp-icon-large">🔐</div>
                    <p>驗證碼已發送到您的 WhatsApp</p>
                    <p class="whatsapp-phone-display" id="code-sent-to"></p>
                </div>
                
                <div class="whatsapp-form-group">
                    <label for="whatsapp-code">請輸入 6 位驗證碼</label>
                    <input type="text" 
                           id="whatsapp-code" 
                           class="whatsapp-input whatsapp-code-input" 
                           maxlength="6" 
                           placeholder="123456"
                           inputmode="numeric">
                    <span class="whatsapp-hint">
                        驗證碼 <span id="countdown">10:00</span> 內有效
                        <button class="whatsapp-link-btn" onclick="resendCode()">重新發送</button>
                    </span>
                </div>
                
                <button class="whatsapp-btn whatsapp-btn-primary" onclick="verifyCode()">
                    <span class="whatsapp-btn-text">驗證並繼續</span>
                    <span class="whatsapp-btn-loading hidden">驗證中...</span>
                </button>
            </div>
            
            <!-- 步驟 3: 分享選項 -->
            <div id="whatsapp-step-share" class="whatsapp-step hidden">
                <div class="whatsapp-intro">
                    <div class="whatsapp-icon-large">✅</div>
                    <p>驗證成功！選擇分享方式</p>
                </div>
                
                <div class="whatsapp-file-preview">
                    <div class="whatsapp-file-icon">📄</div>
                    <div class="whatsapp-file-info">
                        <div class="whatsapp-file-name" id="share-file-name">filename.docx</div>
                        <div class="whatsapp-file-size" id="share-file-size">25 KB</div>
                    </div>
                </div>
                
                <div class="whatsapp-share-options">
                    <button class="whatsapp-share-btn" onclick="shareToSelf()">
                        <span class="whatsapp-share-icon">📤</span>
                        <span class="whatsapp-share-text">
                            <strong>發送給自己</strong>
                            <small>將文件發送到您的 WhatsApp</small>
                        </span>
                    </button>
                    
                    <button class="whatsapp-share-btn" onclick="showCustomerSelection()">
                        <span class="whatsapp-share-icon">👤</span>
                        <span class="whatsapp-share-text">
                            <strong>發送給客戶</strong>
                            <small>從通訊錄選擇或輸入新手機號</small>
                        </span>
                    </button>
                    
                    <button class="whatsapp-share-btn" onclick="generateShareLink()">
                        <span class="whatsapp-share-icon">🔗</span>
                        <span class="whatsapp-share-text">
                            <strong>生成分享鏈接</strong>
                            <small>創建可分享的鏈接</small>
                        </span>
                    </button>
                </div>
            </div>
            
            <!-- 步驟 4: 選擇客戶 -->
            <div id="whatsapp-step-customer" class="whatsapp-step hidden">
                <div class="whatsapp-step-header">
                    <button class="whatsapp-back-btn" onclick="backToShareOptions()">← 返回</button>
                    <h4>選擇客戶</h4>
                </div>
                
                <!-- 客戶通訊錄列表 -->
                <div id="whatsapp-contacts-list" class="whatsapp-contacts-list">
                    <!-- 動態加載 -->
                </div>
                
                <div class="whatsapp-divider">
                    <span>或</span>
                </div>
                
                <!-- 新手機號輸入 -->
                <div class="whatsapp-form-group">
                    <label for="new-customer-phone">新手機號碼</label>
                    <input type="tel" 
                           id="new-customer-phone" 
                           class="whatsapp-input" 
                           placeholder="+86 138 0013 8000">
                </div>
                
                <div class="whatsapp-form-group">
                    <label for="new-customer-name">客戶名稱（可選）</label>
                    <input type="text" 
                           id="new-customer-name" 
                           class="whatsapp-input" 
                           placeholder="客戶姓名或公司名">
                </div>
                
                <button class="whatsapp-btn whatsapp-btn-primary" onclick="shareToNewCustomer()">
                    發送給此客戶
                </button>
            </div>
            
            <!-- 步驟 5: 分享結果 -->
            <div id="whatsapp-step-result" class="whatsapp-step hidden">
                <div class="whatsapp-result" id="whatsapp-result-content">
                    <!-- 動態內容 -->
                </div>
                
                <button class="whatsapp-btn whatsapp-btn-secondary" onclick="closeWhatsAppModal()">
                    完成
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 添加客戶模態框 -->
<div id="whatsapp-add-contact-modal" class="whatsapp-modal whatsapp-modal-small">
    <div class="whatsapp-modal-content">
        <div class="whatsapp-modal-header">
            <h4>添加客戶</h4>

        </div>
        
        <div class="whatsapp-modal-body">
            <div class="whatsapp-form-group">
                <label for="contact-name">客戶名稱 *</label>
                <input type="text" id="contact-name" class="whatsapp-input" placeholder="姓名或公司名">
            </div>
            
            <div class="whatsapp-form-group">
                <label for="contact-phone">手機號碼 *</label>
                <input type="tel" id="contact-phone" class="whatsapp-input" placeholder="+86 138 0013 8000">
            </div>
            
            <div class="whatsapp-form-group">
                <label for="contact-company">公司名稱（可選）</label>
                <input type="text" id="contact-company" class="whatsapp-input" placeholder="公司名稱">
            </div>
            
            <div class="whatsapp-form-group">
                <label for="contact-notes">備註（可選）</label>
                <textarea id="contact-notes" class="whatsapp-textarea" placeholder="備註信息，如：重要客戶、偏好語言等"></textarea>
            </div>
            
            <button class="whatsapp-btn whatsapp-btn-primary" onclick="saveContact()">
                保存客戶
            </button>
        </div>
    </div>

<!-- JavaScript -->
<script>
// WhatsApp 整合 JavaScript
(function() {
    'use strict';
    
    // 全局變量
    let currentFile = null;
    let currentPhone = null;
    let countdownInterval = null;
    let shareLink = null;
    
    // API 基礎 URL
    const API_BASE = window.location.origin;
    
    // ============ Modal 控制 ============
    
    window.showWhatsAppShare = function(fileInfo) {
        currentFile = fileInfo;
        
        // 更新文件預覽
        if (fileInfo) {
            document.getElementById('share-file-name').textContent = fileInfo.name;
            document.getElementById('share-file-size').textContent = formatFileSize(fileInfo.size);
        }
        
        // 檢查是否已驗證
        const savedPhone = localStorage.getItem('whatsapp_phone');
        if (savedPhone) {
            currentPhone = savedPhone;
            showStep('whatsapp-step-share');
        } else {
            showStep('whatsapp-step-verify');
        }
        
        document.getElementById('whatsapp-share-modal').classList.add('active');
    };
    
    window.closeWhatsAppModal = function() {
        document.getElementById('whatsapp-share-modal').classList.remove('active');
        clearCountdown();
        // 重置表單
        setTimeout(() => {
            document.getElementById('whatsapp-phone').value = '';
            document.getElementById('whatsapp-code').value = '';
        }, 300);
    };
    
    function showStep(stepId) {
        // 隱藏所有步驟
        document.querySelectorAll('.whatsapp-step').forEach(step => {
            step.classList.add('hidden');
        });
        // 顯示指定步驟
        document.getElementById(stepId).classList.remove('hidden');
    }
    
    // ============ 驗證流程 ============
    
    window.sendVerificationCode = async function() {
        const phoneInput = document.getElementById('whatsapp-phone');
        const phone = phoneInput.value.trim();
        
        if (!phone) {
            showError('請輸入手機號碼');
            return;
        }
        
        const btn = document.querySelector('#whatsapp-step-verify .whatsapp-btn');
        setButtonLoading(btn, true);
        
        try {
            const response = await fetch(`${API_BASE}/whatsapp/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            
            const data = await response.json();
            
            if (data.success) {
                currentPhone = data.phone;
                document.getElementById('code-sent-to').textContent = data.phone;
                showStep('whatsapp-step-code');
                startCountdown(data.expires_in);
            } else {
                showError(data.message || '發送失敗');
            }
        } catch (error) {
            showError('網絡錯誤，請重試');
            console.error(error);
        } finally {
            setButtonLoading(btn, false);
        }
    };
    
    window.verifyCode = async function() {
        const codeInput = document.getElementById('whatsapp-code');
        const code = codeInput.value.trim();
        
        if (!code || code.length !== 6) {
            showError('請輸入 6 位驗證碼');
            return;
        }
        
        const btn = document.querySelector('#whatsapp-step-code .whatsapp-btn');
        setButtonLoading(btn, true);
        
        try {
            const response = await fetch(`${API_BASE}/whatsapp/verify/code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: currentPhone, code })
            });
            
            const data = await response.json();
            
            if (data.success) {
                // 保存用戶手機號
                localStorage.setItem('whatsapp_phone', currentPhone);
                if (data.user && data.user.name) {
                    localStorage.setItem('whatsapp_name', data.user.name);
                }
                
                clearCountdown();
                showStep('whatsapp-step-share');
            } else {
                showError(data.message || '驗證失敗');
            }
        } catch (error) {
            showError('網絡錯誤，請重試');
            console.error(error);
        } finally {
            setButtonLoading(btn, false);
        }
    };
    
    window.resendCode = function() {
        clearCountdown();
        showStep('whatsapp-step-verify');
        document.getElementById('whatsapp-phone').value = currentPhone || '';
    };
    
    // ============ 分享功能 ============
    
    window.shareToSelf = async function() {
        await performShare('self');
    };
    
    window.showCustomerSelection = async function() {
        // 加載客戶列表
        await loadContacts();
        showStep('whatsapp-step-customer');
    };
    
    window.backToShareOptions = function() {
        showStep('whatsapp-step-share');
    };
    
    window.shareToNewCustomer = async function() {
        const phone = document.getElementById('new-customer-phone').value.trim();
        const name = document.getElementById('new-customer-name').value.trim();
        
        if (!phone) {
            showError('請輸入客戶手機號碼');
            return;
        }
        
        await performShare('customer', phone, name);
    };
    
    window.shareToContact = async function(phone, name) {
        await performShare('customer', phone, name);
    };
    
    window.generateShareLink = async function() {
        // 生成臨時分享鏈接
        shareLink = `${API_BASE}/download/${generateToken()}`;
        await performShare('link', null, null, shareLink);
    };
    
    async function performShare(shareType, targetPhone = null, targetName = null, link = null) {
        if (!currentFile) {
            showError('文件信息缺失');
            return;
        }
        
        const shareData = {
            file_name: currentFile.name,
            file_type: currentFile.type || 'docx',
            file_size: currentFile.size,
            share_type: shareType,
            target_phone: targetPhone,
            target_name: targetName,
            share_link: link || shareLink
        };
        
        try {
            const response = await fetch(`${API_BASE}/whatsapp/share`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Phone': currentPhone
                },
                body: JSON.stringify(shareData)
            });
            
            const data = await response.json();
            
            if (data.success) {
                showShareResult(true, shareType, data);
            } else {
                showShareResult(false, shareType, data);
            }
        } catch (error) {
            showShareResult(false, shareType, { message: '網絡錯誤' });
            console.error(error);
        }
    }
    
    // ============ 客戶通訊錄 ============
    
    async function loadContacts() {
        const container = document.getElementById('whatsapp-contacts-list');
        container.innerHTML = '<div class="whatsapp-empty-contacts">加載中...</div>';
        
        try {
            const response = await fetch(`${API_BASE}/whatsapp/contacts`, {
                headers: { 'X-User-Phone': currentPhone }
            });
            
            const data = await response.json();
            
            if (data.success && data.contacts.length > 0) {
                container.innerHTML = data.contacts.map(contact => `
                    <div class="whatsapp-contact-item" onclick="shareToContact('${contact.phone}', '${contact.name}')">
                        <div class="whatsapp-contact-info">
                            <div class="whatsapp-contact-avatar">${contact.name.charAt(0).toUpperCase()}</div>
                            <div class="whatsapp-contact-details">
                                <span class="whatsapp-contact-name">${escapeHtml(contact.name)}</span>
                                <span class="whatsapp-contact-phone">${contact.phone}</span>
                                ${contact.company ? `<span class="whatsapp-contact-company">${escapeHtml(contact.company)}</span>` : ''}
                            </div>
                        </div>
                        <span class="whatsapp-contact-select">›</span>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `
                    <div class="whatsapp-empty-contacts">
                        暫無客戶記錄
                        <br>
                        <button class="whatsapp-link-btn" onclick="showAddContactModal()">添加第一個客戶</button>
                    </div>
                `;
            }
        } catch (error) {
            container.innerHTML = '<div class="whatsapp-empty-contacts">加載失敗</div>';
            console.error(error);
        }
    }
    
    window.showAddContactModal = function() {
        document.getElementById('whatsapp-add-contact-modal').classList.add('active');
    };
    
    window.closeAddContactModal = function() {
        document.getElementById('whatsapp-add-contact-modal').classList.remove('active');
    };
    
    window.saveContact = async function() {
        const name = document.getElementById('contact-name').value.trim();
        const phone = document.getElementById('contact-phone').value.trim();
        const company = document.getElementById('contact-company').value.trim();
        const notes = document.getElementById('contact-notes').value.trim();
        
        if (!name || !phone) {
            showError('請填寫名稱和手機號碼');
            return;
        }
        
        try {
            const response = await fetch(`${API_BASE}/whatsapp/contacts`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Phone': currentPhone
                },
                body: JSON.stringify({ name, phone, company, notes })
            });
            
            const data = await response.json();
            
            if (data.success) {
                closeAddContactModal();
                // 清空表單
                document.getElementById('contact-name').value = '';
                document.getElementById('contact-phone').value = '';
                document.getElementById('contact-company').value = '';
                document.getElementById('contact-notes').value = '';
                // 刷新列表
                await loadContacts();
            } else {
                showError(data.message || '添加失敗');
            }
        } catch (error) {
            showError('網絡錯誤');
            console.error(error);
        }
    };
    
    // ============ 結果展示 ============
    
    function showShareResult(success, shareType, data) {
        const container = document.getElementById('whatsapp-result-content');
        
        if (success) {
            let shareTypeText = {
                'self': '發送給自己',
                'customer': '發送給客戶',
                'link': '生成分享鏈接'
            }[shareType];
            
            container.innerHTML = `
                <div class="whatsapp-result-icon">✅</div>
                <div class="whatsapp-result-title">分享成功！</div>
                <div class="whatsapp-result-message">文件已通過 WhatsApp ${shareTypeText}</div>
                <div class="whatsapp-result-details">
                    <div class="whatsapp-result-row">
                        <span class="whatsapp-result-label">文件名</span>
                        <span class="whatsapp-result-value">${escapeHtml(currentFile.name)}</span>
                    </div>
                    <div class="whatsapp-result-row">
                        <span class="whatsapp-result-label">發送方式</span>
                        <span class="whatsapp-result-value">${shareTypeText}</span>
                    </div>
                    ${data.sent_to ? `
                    <div class="whatsapp-result-row">
                        <span class="whatsapp-result-label">接收號碼</span>
                        <span class="whatsapp-result-value">${data.sent_to}</span>
                    </div>
                    ` : ''}
                    ${data.share_link ? `
                    <div class="whatsapp-result-row">
                        <span class="whatsapp-result-label">分享鏈接</span>
                        <span class="whatsapp-result-value">
                            <a href="${data.share_link}" target="_blank">查看</a>
                        </span>
                    </div>
                    ` : ''}
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="whatsapp-result-icon">❌</div>
                <div class="whatsapp-result-title">分享失敗</div>
                <div class="whatsapp-result-message">${escapeHtml(data.message || '請稍後重試')}</div>
            `;
        }
        
        showStep('whatsapp-step-result');
    }
    
    // ============ 工具函數 ============
    
    function startCountdown(seconds) {
        clearCountdown();
        let remaining = seconds;
        
        const updateDisplay = () => {
            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            document.getElementById('countdown').textContent = 
                `${mins}:${secs.toString().padStart(2, '0')}`;
        };
        
        updateDisplay();
        
        countdownInterval = setInterval(() => {
            remaining--;
            updateDisplay();
            
            if (remaining <= 0) {
                clearCountdown();
                document.getElementById('countdown').textContent = '已過期';
            }
        }, 1000);
    }
    
    function clearCountdown() {
        if (countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }
    }
    
    function setButtonLoading(btn, loading) {
        const text = btn.querySelector('.whatsapp-btn-text');
        const loader = btn.querySelector('.whatsapp-btn-loading');
        
        if (loading) {
            btn.disabled = true;
            text.classList.add('hidden');
            loader.classList.remove('hidden');
        } else {
            btn.disabled = false;
            text.classList.remove('hidden');
            loader.classList.add('hidden');
        }
    }
    
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }
    
    function generateToken() {
        return Math.random().toString(36).substring(2, 15) + 
               Math.random().toString(36).substring(2, 15);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function showError(message) {
        // 簡單的錯誤提示，可以替換為更友好的 UI
        alert(message);
    }
    
    // 點擊模態框外部關閉
    document.getElementById('whatsapp-share-modal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeWhatsAppModal();
        }
    });
    
    document.getElementById('whatsapp-add-contact-modal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeAddContactModal();
        }
    });
    
    // 驗證碼輸入自動跳轉
    document.getElementById('whatsapp-code').addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '');
        if (this.value.length === 6) {
            verifyCode();
        }
    });
    
})();
</script>
