services:
  - type: web
    name: gebudiu-api-enhanced
    runtime: python
    plan: starter  # $7/month, 512MB RAM
    buildCommand: |
      pip install -r requirements_enhanced.txt
      python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('paraphrase-multilingual-MiniLM-L12-v2')"
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 --graceful-timeout 600 --keep-alive 60 --workers 1 --threads 1 --max-requests 100 wsgi_enhanced:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: TRANSFORMERS_CACHE
        value: /tmp/.cache
    disk:
      name: translation-memory
      mountPath: /data
      sizeGB: 1
